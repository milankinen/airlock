# GitHub Copilot CLI preset
# Based on: https://docs.github.com/en/copilot/reference/copilot-allowlist-reference

[network.rules.copilot-cli]
allow = [
    # GitHub core (path-restricted via middleware below)
    "http:github.com",
    "http:api.github.com",
    # Copilot proxy (no path restriction)
    "copilot-proxy.githubusercontent.com",
    "origin-tracker.githubusercontent.com",
    # Telemetry (path-restricted via middleware below)
    "http:copilot-telemetry.githubusercontent.com",
    "http:collector.github.com",
    # Copilot API endpoints
    "*.githubcopilot.com",
    "*.individual.githubcopilot.com",
    "*.business.githubcopilot.com",
    "*.enterprise.githubcopilot.com",
    # Experimentation
    "default.exp-tas.com",
]

# Path restrictions per the allowlist reference.
# Hosts with middleware get TLS interception to inspect HTTP paths.

[[network.rules.copilot-cli.middleware."github.com"]]
script = """
local p = req.path
if not (p:find("^/login") or p:find("^/enterprises/")) then
  req:deny()
end
"""

[[network.rules.copilot-cli.middleware."api.github.com"]]
script = """
local p = req.path
if not (p == "/user" or p:find("^/copilot_internal/")) then
  req:deny()
end
"""

[[network.rules.copilot-cli.middleware."copilot-telemetry.githubusercontent.com"]]
script = """
if req.path ~= "/telemetry" then
  req:deny()
end
"""

[mounts.copilot-gh-config]
missing = "warn"
source = "~/.config/gh"
target = "~/.config/gh"
