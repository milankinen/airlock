services:
  valkey:
    image: valkey/valkey

  app:
    image: ghcr.io/astral-sh/uv:python3.12-alpine
    working_dir: /app
    volumes:
      - ./app.py:/app/app.py:ro
      # The airlock CA bundle is injected into the VM at this path.
      # uv reads it via SSL_CERT_FILE when resolving the script's deps
      # over the MITM'd HTTPS to PyPI.
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    command: [ "uv", "run", "/app/app.py" ]
    ports:
      - "8000:8000"
    depends_on:
      - valkey
