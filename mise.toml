[tools]
"aqua:docker/cli" = "29.4.0"

[tasks.test]
quiet = true
description = "Run all tests"
run = "cargo test --workspace"

[tasks.format]
quiet = true
description = "Format all code"
run = "cargo +nightly fmt --all"

[tasks.lint]
quiet = true
description = "Lint all code"
run = """
cargo +nightly fmt --all -- --check
cargo clippy --workspace --tests -- -D warnings
"""

[tasks.ez]
description = "Build, sign, and run"
raw = true
depends = ["build:dev", "build:dev-image"]
env.RUST_BACKTRACE = "1"
run = "exec target/debug/ez"

[tasks.claude]
description = "Build, sign, and run"
quiet = true
raw = true
depends = ["build:dev", "build:dev-image"]
run = """
export GIT_AUTHOR_NAME="$(git config --get user.name)"
export GIT_AUTHOR_EMAIL="$(git config --get user.email)"
exec target/debug/ez go --login -- claude --dangerously-skip-permissions --effort=high
"""
