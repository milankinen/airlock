[tools]
"aqua:docker/cli" = "29.4.0"
"github:rust-lang/mdBook" = "0.5.2"

[tasks.test]
quiet = true
description = "Run all tests"
run = "cargo test --workspace"

[tasks.format]
quiet = true
description = "Format all code"
run = "cargo +nightly fmt --all"

[tasks.lint]
quiet = true
description = "Lint all code"
run = """
cargo +nightly fmt --all -- --check
cargo clippy --workspace --tests -- -D warnings
"""

[tasks."docs:build"]
quiet = true
description = "Build documentation"
run = "mdbook build docs/manual"

[tasks."docs:serve"]
description = "Serve documentation with live reload"
raw = true
run = "mdbook serve docs/manual"

[tasks.dev]
description = "Build, sign, and run"
raw = true
depends = ["build:dev", "build:dev-image"]
env.RUST_BACKTRACE = "1"
run = "exec target/debug/airlock"

[tasks.claude]
description = "Build, sign, and run"
quiet = true
raw = true
depends = ["build:dev", "build:dev-image"]
run = """
export GIT_AUTHOR_NAME="$(git config --get user.name)"
export GIT_AUTHOR_EMAIL="$(git config --get user.email)"
export GIT_COMMITTER_NAME="$GIT_AUTHOR_NAME"
export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"
exec target/debug/airlock start --login -- claude --dangerously-skip-permissions --effort=high
"""
