[tools]

[tasks.format]
quiet = true
description = "Format all code"
run = "cargo +nightly fmt --all"

[tasks.lint]
quiet = true
description = "Lint all code"
run = """
cargo +nightly fmt --all -- --check
cargo clippy --workspace -- -D warnings
"""

[tasks."build:kernel"]
description = "Build the kernel using Docker"
sources = ["sandbox/kernel/config-arm64", "sandbox/kernel/build.sh"]
outputs = ["sandbox/out/Image"]
run = """
echo "Building kernel..."
mkdir -p sandbox/out
docker run --rm \
  -v "$PWD/sandbox/kernel/config-arm64:/config:ro" \
  -v "$PWD/sandbox/kernel/build.sh:/build.sh:ro" \
  -v "$PWD/sandbox/out:/out" \
  alpine:3.23 sh /build.sh
echo "Kernel: sandbox/out/Image ($(du -h sandbox/out/Image | cut -f1))"
"""

[tasks."build:supervisor"]
description = "Build the supervisor for Linux (musl) using Docker"
sources = [
    "sandbox/supervisor/src/**/*.rs",
    "sandbox/supervisor/Cargo.toml",
    "protocol/src/**/*.rs",
    "protocol/schema/**/*.capnp",
    "sandbox/supervisor/Dockerfile"
]
outputs = ["sandbox/out/supervisor"]
run = """
echo "Preparing supervisor builder..."
docker build --progress=quiet -t ezpez-supervisor-builder sandbox/supervisor
echo "Building supervisor..."
mkdir -p sandbox/out
docker run --rm \
  -v "$PWD:/workspace:ro" \
  -v "$PWD/sandbox/out:/out" \
  -v ezpez-cargo-cache:/cargo-cache \
  -v ezpez-target-cache:/target \
  ezpez-supervisor-builder sh -c '
    export CARGO_HOME=/cargo-cache
    cd /workspace
    cargo build --release -p ezpez-supervisor --target aarch64-unknown-linux-musl --target-dir /target
    cp /target/aarch64-unknown-linux-musl/release/ezpez-supervisor /out/supervisor
  '
echo "Supervisor: sandbox/out/supervisor ($(du -h sandbox/out/supervisor | cut -f1))"
"""

[tasks."build:rootfs"]
description = "Build the rootfs initramfs using Docker"
depends = ["build:supervisor"]
sources = ["sandbox/rootfs/init", "sandbox/rootfs/build.sh", "sandbox/out/supervisor"]
outputs = ["sandbox/out/initramfs.gz"]
run = """
echo "Building rootfs..."
mkdir -p sandbox/out
docker run --rm \
  -v "$PWD/sandbox/rootfs/init:/init-script:ro" \
  -v "$PWD/sandbox/rootfs/build.sh:/build.sh:ro" \
  -v "$PWD/sandbox/out/supervisor:/supervisor-bin:ro" \
  -v "$PWD/sandbox/out:/out" \
  alpine:3.23 sh /build.sh
echo "Rootfs: sandbox/out/initramfs.gz ($(du -h sandbox/out/initramfs.gz | cut -f1))"
"""

[tasks.build]
description = "Build and codesign the CLI binary"
depends = ["build:kernel", "build:rootfs"]
sources = ["cli/src/**/*.rs", "cli/Cargo.toml", "Cargo.toml", "Cargo.lock", "sandbox/out/Image", "sandbox/out/initramfs.gz"]
outputs = ["target/debug/ez"]
run = """
cargo build -p ezpez-cli "$@"
codesign --entitlements entitlements.plist --force -s - target/debug/ez 2>/dev/null || true
"""

[tasks.ez]
description = "Build, sign, and run"
raw = true
depends = ["build"]
run = "target/debug/ez"
