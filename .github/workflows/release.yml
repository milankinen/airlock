name: Release
run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      run_id:
        description: "CI run ID (leave empty for latest successful on main)"
        required: false
        type: string

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      ci_run_id: ${{ steps.ci-run.outputs.run_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve CI run ID
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download artifacts from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ steps.ci-run.outputs.run_id }}"
          echo "Downloading artifacts from CI run $RUN_ID"
          for name in airlock-macos-aarch64 airlock-linux-x86_64 airlock-linux-aarch64 \
                      airlock-macos-aarch64-distroless airlock-linux-x86_64-distroless airlock-linux-aarch64-distroless; do
            gh run download "$RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "artifacts/${name#airlock-}"
          done
      - name: Package release artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"

          for variant in darwin-aarch64-bundled:macos-aarch64 linux-x86_64-bundled:linux-x86_64 linux-aarch64-bundled:linux-aarch64 \
                         darwin-aarch64-distroless:macos-aarch64-distroless \
                         linux-x86_64-distroless:linux-x86_64-distroless \
                         linux-aarch64-distroless:linux-aarch64-distroless; do
            NAME="${variant%%:*}"
            DIR="${variant##*:}"
            ARCHIVE="airlock-${VERSION}-${NAME}.tar.gz"
            chmod +x "artifacts/${DIR}/airlock"
            python3 -c "import sys; v=sys.argv[1].encode('utf-8'); sys.stdout.buffer.write(v + len(v).to_bytes(4, 'little'))" "$VERSION" >> "artifacts/${DIR}/airlock"
            tar -czf "$ARCHIVE" -C "artifacts/${DIR}" airlock
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          done

          sed -i "s/^DEFAULT_VERSION=\"\"/DEFAULT_VERSION=\"${VERSION}\"/" install.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "$VERSION" \
            airlock-${VERSION}-darwin-aarch64-bundled.tar.gz \
            airlock-${VERSION}-darwin-aarch64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-linux-x86_64-bundled.tar.gz \
            airlock-${VERSION}-linux-x86_64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-linux-aarch64-bundled.tar.gz \
            airlock-${VERSION}-linux-aarch64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-darwin-aarch64-distroless.tar.gz \
            airlock-${VERSION}-darwin-aarch64-distroless.tar.gz.sha256 \
            airlock-${VERSION}-linux-x86_64-distroless.tar.gz \
            airlock-${VERSION}-linux-x86_64-distroless.tar.gz.sha256 \
            airlock-${VERSION}-linux-aarch64-distroless.tar.gz \
            airlock-${VERSION}-linux-aarch64-distroless.tar.gz.sha256 \
            install.sh \
            --repo "$GITHUB_REPOSITORY" --generate-notes

  publish-manual:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download manual artifact from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ needs.release.outputs.ci_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name manual \
            --dir manual
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: manual
      - id: deploy
        uses: actions/deploy-pages@v4
