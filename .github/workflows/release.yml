name: Release
run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      run_id:
        description: "CI run ID (leave empty for latest successful on main)"
        required: false
        type: string

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          echo "Downloading artifacts from CI run $RUN_ID"
          for name in ez-macos-aarch64 ez-linux-x86_64 ez-linux-aarch64 \
                      ez-macos-aarch64-distroless ez-linux-x86_64-distroless ez-linux-aarch64-distroless; do
            gh run download "$RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "artifacts/${name#ez-}"
          done
      - name: Package release artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"

          for variant in darwin-aarch64:macos-aarch64 linux-x86_64:linux-x86_64 linux-aarch64:linux-aarch64 \
                         darwin-aarch64-distroless:macos-aarch64-distroless \
                         linux-x86_64-distroless:linux-x86_64-distroless \
                         linux-aarch64-distroless:linux-aarch64-distroless; do
            NAME="${variant%%:*}"
            DIR="${variant##*:}"
            ARCHIVE="ez-${VERSION}-${NAME}.tar.gz"
            chmod +x "artifacts/${DIR}/ez"
            python3 -c "import sys; v=sys.argv[1].encode('utf-8'); sys.stdout.buffer.write(v + len(v).to_bytes(4, 'little'))" "$VERSION" >> "artifacts/${DIR}/ez"
            tar -czf "$ARCHIVE" -C "artifacts/${DIR}" ez
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          done

          sed -i "s/^DEFAULT_VERSION=\"\"/DEFAULT_VERSION=\"${VERSION}\"/" install.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "$VERSION" \
            ez-${VERSION}-darwin-aarch64.tar.gz \
            ez-${VERSION}-darwin-aarch64.tar.gz.sha256 \
            ez-${VERSION}-linux-x86_64.tar.gz \
            ez-${VERSION}-linux-x86_64.tar.gz.sha256 \
            ez-${VERSION}-linux-aarch64.tar.gz \
            ez-${VERSION}-linux-aarch64.tar.gz.sha256 \
            ez-${VERSION}-darwin-aarch64-distroless.tar.gz \
            ez-${VERSION}-darwin-aarch64-distroless.tar.gz.sha256 \
            ez-${VERSION}-linux-x86_64-distroless.tar.gz \
            ez-${VERSION}-linux-x86_64-distroless.tar.gz.sha256 \
            ez-${VERSION}-linux-aarch64-distroless.tar.gz \
            ez-${VERSION}-linux-aarch64-distroless.tar.gz.sha256 \
            install.sh \
            --repo "$GITHUB_REPOSITORY" --generate-notes
