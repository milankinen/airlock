name: Release
run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      run_id:
        description: "CI run ID (leave empty for latest successful on main)"
        required: false
        type: string

jobs:
  resolve-ci-run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.ci-run.outputs.run_id }}
    steps:
      - name: Resolve CI run ID
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

  sign-macos:
    needs: resolve-ci-run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS binaries from CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for name in airlock-macos-aarch64 airlock-macos-aarch64-distroless; do
            gh run download "${{ needs.resolve-ci-run.outputs.run_id }}" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "artifacts/$name"
          done
      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$CERT_B64" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$CERT_PASS" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm -f "$P12"
      - name: Patch version slot and sign
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          for dir in artifacts/airlock-macos-aarch64 artifacts/airlock-macos-aarch64-distroless; do
            BIN="$dir/airlock"
            chmod +x "$BIN"
            mise/tasks/release/patch-version "$BIN" "$VERSION"
            codesign --entitlements entitlements.plist \
                     --force \
                     --sign "$APPLE_SIGNING_IDENTITY" \
                     --identifier airlock.cli \
                     --options runtime \
                     --timestamp \
                     "$BIN"
            codesign --verify --deep --strict --verbose=2 "$BIN"
            codesign --display --verbose=2 "$BIN"
          done
      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN" ]; then
            security delete-keychain "$KEYCHAIN" || true
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-macos-aarch64-signed
          path: artifacts/airlock-macos-aarch64/airlock
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-macos-aarch64-distroless-signed
          path: artifacts/airlock-macos-aarch64-distroless/airlock

  release:
    needs: [resolve-ci-run, sign-macos]
    runs-on: ubuntu-latest
    outputs:
      ci_run_id: ${{ needs.resolve-ci-run.outputs.run_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux artifacts from CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for name in airlock-linux-x86_64 airlock-linux-aarch64 \
                      airlock-linux-x86_64-distroless airlock-linux-aarch64-distroless; do
            gh run download "${{ needs.resolve-ci-run.outputs.run_id }}" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "artifacts/${name#airlock-}"
          done
      - uses: actions/download-artifact@v4
        with:
          name: airlock-macos-aarch64-signed
          path: artifacts/macos-aarch64
      - uses: actions/download-artifact@v4
        with:
          name: airlock-macos-aarch64-distroless-signed
          path: artifacts/macos-aarch64-distroless
      - name: Package release artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"

          for variant in darwin-aarch64-bundled:macos-aarch64 linux-x86_64-bundled:linux-x86_64 linux-aarch64-bundled:linux-aarch64 \
                         darwin-aarch64-distroless:macos-aarch64-distroless \
                         linux-x86_64-distroless:linux-x86_64-distroless \
                         linux-aarch64-distroless:linux-aarch64-distroless; do
            NAME="${variant%%:*}"
            DIR="${variant##*:}"
            ARCHIVE="airlock-${VERSION}-${NAME}.tar.gz"
            chmod +x "artifacts/${DIR}/airlock"
            # macOS binaries already had the slot patched before codesign;
            # re-patching here would invalidate the signature.
            case "$DIR" in
              macos-*) ;;
              *) mise/tasks/release/patch-version "artifacts/${DIR}/airlock" "$VERSION" ;;
            esac
            tar -czf "$ARCHIVE" -C "artifacts/${DIR}" airlock
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          done

          sed -i "s/^DEFAULT_VERSION=\"\"/DEFAULT_VERSION=\"${VERSION}\"/" install.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "$VERSION" \
            airlock-${VERSION}-darwin-aarch64-bundled.tar.gz \
            airlock-${VERSION}-darwin-aarch64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-linux-x86_64-bundled.tar.gz \
            airlock-${VERSION}-linux-x86_64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-linux-aarch64-bundled.tar.gz \
            airlock-${VERSION}-linux-aarch64-bundled.tar.gz.sha256 \
            airlock-${VERSION}-darwin-aarch64-distroless.tar.gz \
            airlock-${VERSION}-darwin-aarch64-distroless.tar.gz.sha256 \
            airlock-${VERSION}-linux-x86_64-distroless.tar.gz \
            airlock-${VERSION}-linux-x86_64-distroless.tar.gz.sha256 \
            airlock-${VERSION}-linux-aarch64-distroless.tar.gz \
            airlock-${VERSION}-linux-aarch64-distroless.tar.gz.sha256 \
            install.sh \
            --repo "$GITHUB_REPOSITORY" --generate-notes

  publish-manual:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download manual artifact from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ needs.release.outputs.ci_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name manual \
            --dir manual
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: manual
      - id: deploy
        uses: actions/deploy-pages@v4
