name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      run_id:
        description: "CI run ID (leave empty for latest successful on main)"
        required: false
        type: string

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          echo "Downloading artifact from CI run $RUN_ID"
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name ez \
            --dir .
      - name: Package release artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCHIVE="ez-${VERSION}-darwin-aarch64.tar.gz"
          chmod +x ez
          tar -czf "$ARCHIVE" ez
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          sed -i "s/^DEFAULT_VERSION=\"\"/DEFAULT_VERSION=\"${VERSION}\"/" install.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCHIVE="ez-${VERSION}-darwin-aarch64.tar.gz"
          gh release create "$VERSION" \
            "$ARCHIVE" "${ARCHIVE}.sha256" "install.sh" \
            --repo "$GITHUB_REPOSITORY" --generate-notes
