name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ── Stage 1 ────────────────────────────────────────────
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install rustfmt
        run: |
          rustup component add clippy
          rustup toolchain install nightly --component rustfmt
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run test

  # ── Stage 2 ────────────────────────────────────────────
  build-kernel-aarch64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        id: kernel-cache
        with:
          path: sandbox/out/Image
          key: kernel-aarch64-${{ hashFiles('sandbox/kernel/config-arm64', 'sandbox/kernel/build.sh') }}
      - if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: mise run build:kernel
      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: sandbox/out/Image

  build-rootfs-aarch64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Build supervisor
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev musl-tools
          rustup target add aarch64-unknown-linux-musl
          cargo build --release -p ezpez-supervisor --target aarch64-unknown-linux-musl
          mkdir -p sandbox/out
          cp target/aarch64-unknown-linux-musl/release/ezpez-supervisor sandbox/out/supervisor
      - run: mise run build:rootfs --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: sandbox/out/initramfs.gz

  # ── Stage 3 ────────────────────────────────────────────
  build-cli-macos-aarch64:
    needs: [ build-kernel-aarch64, build-rootfs-aarch64 ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: kernel
          path: sandbox/out
      - uses: actions/download-artifact@v4
        with:
          name: rootfs
          path: sandbox/out
      - run: cargo build --release -p ezpez-cli
      - run: codesign --entitlements entitlements.plist --force -s - target/release/ez
      - uses: actions/upload-artifact@v4
        with:
          name: ez
          path: target/release/ez

