name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ── Stage 1 ────────────────────────────────────────────
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install rustfmt
        run: |
          rustup component add clippy
          rustup toolchain install nightly --component rustfmt
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run test

  # ── Stage 2: build artifacts ───────────────────────────
  build-kernel-aarch64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        id: kernel-cache
        with:
          path: sandbox/out/Image
          key: kernel-aarch64-${{ hashFiles('sandbox/kernel/config-arm64', 'sandbox/kernel/build.sh') }}
      - if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: mise run build:kernel
      - uses: actions/upload-artifact@v4
        with:
          name: kernel-aarch64
          path: sandbox/out/Image

  build-rootfs-aarch64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev musl-tools
          rustup target add aarch64-unknown-linux-musl
      - name: Build supervisor
        run: SUPERVISOR_BUILD_HOST=true mise run build:supervisor
      - run: mise run build:rootfs --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: rootfs-aarch64
          path: |
            sandbox/out/initramfs.gz
            sandbox/out/rootfs.tar.gz

  build-rootfs-x86_64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Build supervisor
        run: SUPERVISOR_BUILD_HOST=true mise run build:supervisor
      - run: mise run build:rootfs --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: rootfs-x86_64
          path: sandbox/out/rootfs.tar.gz

  build-libkrun-x86_64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run build:libkrun
      - uses: actions/upload-artifact@v4
        with:
          name: libkrun-x86_64
          path: |
            sandbox/out/libkrun.so
            sandbox/out/libkrunfw.so

  build-libkrun-aarch64:
    needs: [ lint, test ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run build:libkrun
      - uses: actions/upload-artifact@v4
        with:
          name: libkrun-aarch64
          path: |
            sandbox/out/libkrun.so
            sandbox/out/libkrunfw.so

  # ── Stage 3: CLI binaries ──────────────────────────────
  build-cli-macos-aarch64:
    needs: [ build-kernel-aarch64, build-rootfs-aarch64 ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: kernel-aarch64
          path: sandbox/out
      - uses: actions/download-artifact@v4
        with:
          name: rootfs-aarch64
          path: sandbox/out
      - run: cargo build --release -p ezpez-cli
      - run: codesign --entitlements entitlements.plist --force -s - target/release/ez
      - uses: actions/upload-artifact@v4
        with:
          name: ez-macos-aarch64
          path: target/release/ez

  build-cli-linux-x86_64:
    needs: [ build-rootfs-x86_64, build-libkrun-x86_64 ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: rootfs-x86_64
          path: sandbox/out
      - uses: actions/download-artifact@v4
        with:
          name: libkrun-x86_64
          path: sandbox/out
      - run: cargo build --release -p ezpez-cli
      - uses: actions/upload-artifact@v4
        with:
          name: ez-linux-x86_64
          path: target/release/ez

  build-cli-linux-aarch64:
    needs: [ build-rootfs-aarch64, build-libkrun-aarch64 ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: rootfs-aarch64
          path: sandbox/out
      - uses: actions/download-artifact@v4
        with:
          name: libkrun-aarch64
          path: sandbox/out
      - run: cargo build --release -p ezpez-cli
      - uses: actions/upload-artifact@v4
        with:
          name: ez-linux-aarch64
          path: target/release/ez
