name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ── Stage 1 ────────────────────────────────────────────
  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install deps
        run: |
          rustup component add clippy
          rustup toolchain install nightly --component rustfmt
          brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run lint

  lint-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev libclang-dev
          rustup component add clippy
          rustup toolchain install nightly --component rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: mise run lint

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: mise run test

  test-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - run: mise run test

  build-manual:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run docs:build
      - uses: actions/upload-artifact@v4
        with:
          name: manual
          path: target/manual

  # ── Stage 2: build artifacts ───────────────────────────
  build-kernel-aarch64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        id: kernel-cache
        with:
          path: target/vm/Image
          key: kernel-aarch64-${{ hashFiles('app/vm-kernel/config-arm64', 'app/vm-kernel/build.sh') }}
      - if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: mise run build:kernel
      - uses: actions/upload-artifact@v4
        with:
          name: kernel-aarch64
          path: target/vm/Image

  build-kernel-x86_64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        id: kernel-cache
        with:
          path: target/vm/Image
          key: kernel-x86_64-${{ hashFiles('app/vm-kernel/config-x86_64', 'app/vm-kernel/build.sh') }}
      - if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: mise run build:kernel
      - uses: actions/upload-artifact@v4
        with:
          name: kernel-x86_64
          path: target/vm/Image

  build-initramfs-aarch64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev musl-tools
          rustup target add aarch64-unknown-linux-musl
      - name: Build airlockd
        run: SUPERVISOR_BUILD_HOST=true mise run build:airlockd
      - run: mise run build:initramfs --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: initramfs-aarch64
          path: target/vm/initramfs.gz

  build-initramfs-x86_64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Build airlockd
        run: SUPERVISOR_BUILD_HOST=true mise run build:airlockd
      - run: mise run build:initramfs --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: initramfs-x86_64
          path: target/vm/initramfs.gz

  fetch-vmm-x86_64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run fetch:cloud-hypervisor
      - run: mise run build:virtiofsd
      - uses: actions/upload-artifact@v4
        with:
          name: vmm-x86_64
          path: |
            target/vm/cloud-hypervisor
            target/vm/virtiofsd

  fetch-vmm-aarch64:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run fetch:cloud-hypervisor
      - run: mise run build:virtiofsd
      - uses: actions/upload-artifact@v4
        with:
          name: vmm-aarch64
          path: |
            target/vm/cloud-hypervisor
            target/vm/virtiofsd

  # ── Stage 3: CLI binaries ──────────────────────────────
  build-cli-macos-aarch64:
    needs: [ build-kernel-aarch64, build-initramfs-aarch64 ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: kernel-aarch64
          path: target/vm
      - uses: actions/download-artifact@v4
        with:
          name: initramfs-aarch64
          path: target/vm
      - run: cargo build --release -p airlock-cli
      - run: codesign --entitlements entitlements.plist --force -s - target/release/airlock
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-macos-aarch64
          path: target/release/airlock

  build-cli-linux-x86_64:
    needs: [ build-kernel-x86_64, build-initramfs-x86_64, fetch-vmm-x86_64 ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: kernel-x86_64
          path: target/vm
      - uses: actions/download-artifact@v4
        with:
          name: initramfs-x86_64
          path: target/vm
      - uses: actions/download-artifact@v4
        with:
          name: vmm-x86_64
          path: target/vm
      - run: cargo build --release -p airlock-cli
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-linux-x86_64
          path: target/release/airlock

  build-cli-linux-aarch64:
    needs: [ build-kernel-aarch64, build-initramfs-aarch64, fetch-vmm-aarch64 ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: kernel-aarch64
          path: target/vm
      - uses: actions/download-artifact@v4
        with:
          name: initramfs-aarch64
          path: target/vm
      - uses: actions/download-artifact@v4
        with:
          name: vmm-aarch64
          path: target/vm
      - run: cargo build --release -p airlock-cli
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-linux-aarch64
          path: target/release/airlock

  # ── Stage 4: VM integration tests (bats) ───────────────
  test-e2e:
    needs: [ build-cli-linux-x86_64 ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/download-artifact@v4
        with:
          name: airlock-linux-x86_64
          path: .tmp/bin
      - name: Run VM bats tests
        run: |
          chmod +x .tmp/bin/airlock
          AIRLOCK_BIN="$(pwd)/.tmp/bin/airlock" bats tests/vm/

  # ── Stage 3b: distroless CLI binaries (no bundled kernel/initramfs) ────
  build-cli-macos-aarch64-distroless:
    needs: [ lint-macos, lint-linux, test-macos, test-linux ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: brew install capnp
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p airlock-cli --features distroless
      - run: codesign --entitlements entitlements.plist --force -s - target/release/airlock
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-macos-aarch64-distroless
          path: target/release/airlock

  build-cli-linux-x86_64-distroless:
    needs: [ lint-macos, lint-linux, test-macos, test-linux, fetch-vmm-x86_64 ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: vmm-x86_64
          path: target/vm
      - run: cargo build --release -p airlock-cli --features distroless
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-linux-x86_64-distroless
          path: target/release/airlock

  build-cli-linux-aarch64-distroless:
    needs: [ lint-macos, lint-linux, test-macos, test-linux, fetch-vmm-aarch64 ]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install capnp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: vmm-aarch64
          path: target/vm
      - run: cargo build --release -p airlock-cli --features distroless
      - uses: actions/upload-artifact@v4
        with:
          name: airlock-linux-aarch64-distroless
          path: target/release/airlock
