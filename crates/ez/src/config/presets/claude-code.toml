[network.rules.claude-code]
allow = [
    "claude.ai:443",
    "downloads.claude.ai:443",
    "platform.claude.com:443",
    "api.anthropic.com:443",
]

[mounts.claude-dir]
missing = "warn"
source = "~/.claude"
target = "~/.claude"

[mounts.claude-json]
missing = "warn"
source = "~/.claude.json"
target = "~/.claude.json"
