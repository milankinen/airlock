# Claude code development preset

[network.rules.claude-code]
allow = [
    "http:claude.ai:443",
    "http:downloads.claude.ai:443",
    "http:platform.claude.com:443",
    "http:api.anthropic.com:443",
]

[mounts.claude-dir]
missing = "warn"
source = "~/.claude"
target = "~/.claude"

[mounts.claude-json]
missing = "warn"
source = "~/.claude.json"
target = "~/.claude.json"
