# Claude code development preset

[env]
CLAUDE_CODE_OAUTH_TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN:}"

[network.rules.claude-code]
allow = [
    "claude.ai:443",
    "downloads.claude.ai:443",
    "platform.claude.com:443",
    "api.anthropic.com:443",
]

[mounts.claude-settings]
missing = "create-dir"
source = "~/.airlock/claude/settings"
target = "~/.claude"

[mounts.claude-json]
missing = "create-file"
file_content = "{\"hasCompletedOnboarding\":true}"
source = "~/.airlock/claude/claude.json"
target = "~/.claude.json"
