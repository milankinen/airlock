# Claude code development preset

[env]
# Claude needs a placeholder token to work
CLAUDE_CODE_OAUTH_TOKEN = "real-token-will-be-injected"
# Tell that we're inside sandbox
IS_SANDBOX = "1"
# Claude uses Node certs - must add airlock CA to the trusted certs
NODE_EXTRA_CA_CERTS = "/etc/ssl/certs/ca-certificates.crt"

[network.rules.claude-code]
allow = [
    "claude.ai:443",
    "downloads.claude.ai:443",
    "platform.claude.com:443",
    "api.anthropic.com:443",
]

[mounts.claude-settings]
missing = "create-dir"
source = "~/.airlock/claude/settings"
target = "~/.claude"

[mounts.claude-json]
missing = "create-file"
file_content = "{\"hasCompletedOnboarding\":true}"
source = "~/.airlock/claude/claude.json"
target = "~/.claude.json"

# Inject real token at host middleware
[network.middleware.claude-auth-token]
target = ["api.anthropic.com:443"]
env.TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN}"
script = """
if env.TOKEN then
  req:setHeader("Authorization", "Bearer " .. env.TOKEN)
end
"""