presets = ["debian", "rust", "claude-code", "openai-codex", "copilot-cli"]

[vm]
image = "airlock:dev"

[env]
# We can always build natively inside vm
SUPERVISOR_BUILD_HOST = "true"
# We can use host's docker image
SKIP_DEV_IMAGE_BUILD = "true"
# Git configs
GIT_AUTHOR_NAME = "${GIT_AUTHOR_NAME:-}"
GIT_AUTHOR_EMAIL = "${GIT_AUTHOR_EMAIL:-}"
GIT_COMMITTER_NAME = "${GIT_COMMITTER_NAME:-}"
GIT_COMMITTER_EMAIL = "${GIT_COMMITTER_EMAIL:-}"
CARGO_TARGET_DIR = "/tmp/cargo"

[disk]
size = "20 GB"

[network]
policy = "deny-by-default"
